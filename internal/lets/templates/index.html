<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lets</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5ef;
      --text: #1e2528;
      --muted: #586266;
      --line: #d8d2c5;
      --accent: #0f766e;
      --accent-dark: #0b5f59;
      --error: #9f1239;
      --success: #166534;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    main {
      width: min(680px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(40px, 8vw, 72px);
      line-height: 1;
      letter-spacing: 0;
    }

    .intro {
      margin: 16px 0 32px;
      max-width: 48rem;
      color: var(--muted);
      font-size: 18px;
    }

    form {
      display: grid;
      gap: 18px;
      padding-top: 6px;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 650;
    }

    span {
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fffdfa;
      color: var(--text);
      font: inherit;
      min-height: 46px;
      padding: 10px 12px;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
      outline: 3px solid rgba(15, 118, 110, 0.18);
    }

    button {
      justify-self: start;
      min-height: 46px;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font: inherit;
      font-weight: 750;
      padding: 10px 18px;
    }

    button:hover,
    button:focus-visible {
      background: var(--accent-dark);
    }

    .message {
      border-left: 4px solid currentColor;
      margin: 0 0 18px;
      padding: 10px 12px;
      background: #fffdfa;
    }

    .message.error {
      color: var(--error);
    }

    .message.success {
      color: var(--success);
    }
  </style>
</head>
<body>
  <main>
    <h1>lets</h1>
    <p class="intro">Pick a Wednesday sometime in the next two months and tell me how to reach you. Suggest a lunch spot if you have one.</p>

    {{if .Saved}}
      <p class="message success">Saved. I will follow up.</p>
    {{end}}

    {{if .Error}}
      <p class="message error">{{.Error}}</p>
    {{end}}

    <form method="post" action="/requests">
      <label>
        Wednesday
        <select name="date" required>
          <option value="">Choose a date</option>
          {{range .Dates}}
            <option value="{{.Value}}" {{if eq $.SelectedDate .Value}}selected{{end}}>{{.Label}}</option>
          {{end}}
        </select>
      </label>

      <label>
        Name or email
        <input name="contact" value="{{.Contact}}" autocomplete="name email" required>
      </label>

      <label>
        Suggested location
        <span>Optional</span>
        <input name="suggested_location" value="{{.SuggestedLocation}}" autocomplete="off">
      </label>

      <button type="submit">Get lunch</button>
    </form>
  </main>
</body>
</html>
